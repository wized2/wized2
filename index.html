<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="description" content="Professional profile — dark green, edge‑to‑edge">
  <meta name="theme-color" content="#0b130b">
  <title>Mudasir Wazir</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a100a;
      background-image: radial-gradient(circle at 20% 20%, #142614 0%, #030603 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      color: #e2f0e2;
      line-height: 1.5;
      padding: 0;
      margin: 0;
    }

    .app-container {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 1.5rem 1.2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar-frame {
      margin-bottom: 1.2rem;
    }

    .avatar {
      width: 124px;
      height: 124px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #2ecc71;
      box-shadow: 0 10px 24px rgba(46, 204, 113, 0.25), 0 0 0 2px rgba(46, 204, 113, 0.15);
      transition: box-shadow 0.2s ease;
      background: #1b2a1b;
    }

    .name {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      color: #f2fcf2;
      margin-bottom: 0.2rem;
      text-shadow: 0 2px 6px rgba(0, 25, 0, 0.6);
      line-height: 1.2;
    }

    .headline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      color: #bfd9bf;
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 1.1rem;
    }

    .headline i {
      color: #2ecc71;
      font-size: 1rem;
      opacity: 0.9;
    }

    .bio {
      text-align: center;
      max-width: 500px;
      margin: 0.6rem auto 1.8rem;
      padding: 0.5rem 0.8rem;
      font-size: 1rem;
      color: #b3ccb3;
      border-left: 3px solid #2ecc71;
      background: linear-gradient(90deg, #1a2e1a20, transparent);
      border-radius: 0 8px 8px 0;
    }

    .links-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin: 0.5rem 0 1.8rem;
    }

    .link-item {
      display: flex;
      align-items: center;
      padding: 1rem 1.5rem;
      background: #0f1c0f;
      border: 1.2px solid #2ecc7150;
      border-radius: 60px;
      color: #e0f0e0;
      text-decoration: none;
      font-weight: 500;
      font-size: 1.15rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.25s ease;
      box-shadow: 0 8px 14px rgba(0, 0, 0, 0.4);
      width: 100%;
    }

    .link-item i {
      font-size: 1.4rem;
      width: 2rem;
      color: #2ecc71;
      margin-right: 0.8rem;
      transition: transform 0.2s;
    }

    .link-item span {
      flex: 1;
    }

    .link-item .arrow {
      opacity: 0.7;
      font-size: 1rem;
      transition: opacity 0.2s, transform 0.2s;
    }

    .link-item:hover {
      background: #2ecc71;
      border-color: #2ecc71;
      color: #0a1a0a;
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 15px 25px -8px #1b4b1b, 0 0 0 1px #a3e0b5 inset;
    }

    .link-item:hover i,
    .link-item:hover .arrow {
      color: #0e2b0e;
    }

    .link-item:hover .arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    /* Updated footer: column layout, social icons on top, copyright below */
    .footer-mini {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      margin-top: 1rem;
      padding-top: 1.2rem;
      border-top: 1px dashed #2ecc7140;
      color: #86a686;
      font-size: 0.8rem;
    }

    .social-icons {
      display: flex;
      gap: 1.5rem;
    }

    .social-icons a {
      color: #b0cfb0;
      font-size: 1.3rem;
      transition: color 0.2s, transform 0.15s;
    }

    .social-icons a:hover {
      color: #2ecc71;
      transform: translateY(-2px);
    }

    .copyright {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .copyright i {
      color: #2ecc71;
      margin-right: 2px;
    }

    @media (max-width: 480px) {
      .app-container {
        padding: 1.2rem 1rem 2rem;
      }
      .name {
        font-size: 2.2rem;
      }
      .avatar {
        width: 108px;
        height: 108px;
      }
      .link-item {
        padding: 0.9rem 1.2rem;
        font-size: 1rem;
      }
      .link-item i {
        font-size: 1.25rem;
      }
      .bio {
        font-size: 0.95rem;
      }
      .social-icons {
        gap: 1.2rem;
      }
    }

    .link-item:focus-visible {
      outline: 3px solid #2ecc71;
      outline-offset: 4px;
    }
  </style>
</head>

<div class="app-container">

      <a href="https://github.com/wized2/" aria-label="GitHub"><i class="fab fa-github"></i></a>

    </div>
    <div class="copyright">
      <i class="fas fa-leaf"></i> 2026 · Mudasir Wazir 
    </div>
  </div>
</div>
</body>
  </html>
